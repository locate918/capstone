name: Scrape Locate918 Sources

on:
  schedule:
    - cron: '0 8 * * 4'   # Thursday 8am UTC = 3am CDT / 2am CST

  workflow_dispatch:
    inputs:
      job_type:
        description: 'Scope'
        required: true
        type: choice
        options: [all, priority]
        default: all
      priority:
        description: 'Priority filter when job_type=priority. e.g. "1" or "1,2"'
        required: false
        type: string
        default: '1'

jobs:
  # ── Stage 1: read saved_urls.json, emit matrix of URLs ──────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      urls: ${{ steps.read.outputs.urls }}
      count: ${{ steps.read.outputs.count }}
    steps:
      - uses: actions/checkout@v4
      - id: read
        env:
          JOB_TYPE: ${{ github.event.inputs.job_type || 'all' }}
          PRIORITY: ${{ github.event.inputs.priority || '1' }}
        run: |
          SAVED_URLS_PATH="backend/src/scraper/saved_urls.json"   # adjust if different

          if [ "$JOB_TYPE" = "priority" ]; then
            FILTER=$(echo "$PRIORITY" | tr ',' '\n' | jq -Rcs 'split("\n") | map(select(length > 0)) | map(tonumber)')
            URLS=$(jq -c --argjson p "$FILTER" \
              '[.[] | select(((.priority // .venue_priority // 3)) as $pri | $p | index($pri)) | .url]' \
              "$SAVED_URLS_PATH")
          else
            URLS=$(jq -c '[.[].url]' "$SAVED_URLS_PATH")
          fi

          COUNT=$(echo "$URLS" | jq 'length')
          echo "Matched $COUNT venues"
          echo "urls=$URLS" >> "$GITHUB_OUTPUT"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

  # ── Stage 2: scrape each venue in its own job ───────────────────────
  scrape:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        url: ${{ fromJson(needs.prepare.outputs.urls) }}
      max-parallel: 1     # start conservative — bump to 5 once stable
      fail-fast: false      # one venue failing ≠ kill the rest
    timeout-minutes: 10
    steps:
      - name: Scrape ${{ matrix.url }}
        env:
          SCRAPER_URL: https://fearless-determination-production-7f32.up.railway.app
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          echo "Scraping: ${{ matrix.url }}"

          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET not set"
            exit 1
          fi

          # Escape URL for JSON body
          JSON_BODY=$(jq -cn --arg u "${{ matrix.url }}" '{url: $u}')

          curl --fail-with-body \
               --max-time 540 \
               --connect-timeout 30 \
               --show-error --silent \
               -X POST \
               -H "Content-Type: application/json" \
               -d "$JSON_BODY" \
               -w "\n\n[HTTP %{http_code} — total %{time_total}s]\n" \
               "$SCRAPER_URL/scrape-source?secret=$CRON_SECRET"

  # ── Stage 3: summary of what passed/failed ──────────────────────────
  summary:
    needs: scrape
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Scrape run complete. Check individual job statuses above."
          echo "Total venues attempted: ${{ needs.prepare.outputs.count }}"