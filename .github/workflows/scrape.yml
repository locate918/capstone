name: Scrape Locate918 Sources

on:
  # Weekly full scrape: Thursday 8am UTC
  # = 3am CDT (summer) / 2am CST (winter) — DST drift accepted
  schedule:
    - cron: '0 8 * * 4'

  # Manual trigger from Actions tab — full override of schedule
  workflow_dispatch:
    inputs:
      job_type:
        description: 'Scrape scope'
        required: true
        type: choice
        options:
          - all
          - priority
        default: all
      priority:
        description: 'Priority filter (used only if job_type=priority). e.g. "1" or "1,2"'
        required: false
        type: string
        default: '1'

jobs:
  scrape:
    name: Trigger scrape
    runs-on: ubuntu-latest
    timeout-minutes: 180   # 3hr — matches gunicorn --timeout 10800

    steps:
      - name: Call /cron-scrape
        env:
          SCRAPER_URL: https://fearless-determination-production-7f32.up.railway.app
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          JOB_TYPE:    ${{ github.event.inputs.job_type || 'all' }}
          PRIORITY:    ${{ github.event.inputs.priority || '1' }}
        run: |
          echo "=================================================="
          echo "  Locate918 Scheduled Scrape"
          echo "  Trigger:  ${{ github.event_name }}"
          echo "  Job type: $JOB_TYPE"
          if [ "$JOB_TYPE" = "priority" ]; then
            echo "  Priority: $PRIORITY"
          fi
          echo "  Target:   $SCRAPER_URL"
          echo "=================================================="

          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET is not set in repo secrets"
            exit 1
          fi

          # Build URL (never echo — contains the secret)
          if [ "$JOB_TYPE" = "priority" ]; then
            URL="$SCRAPER_URL/cron-scrape?secret=$CRON_SECRET&priority=$PRIORITY"
          else
            URL="$SCRAPER_URL/cron-scrape?secret=$CRON_SECRET"
          fi

          curl --fail-with-body \
               --max-time 10800 \
               --connect-timeout 30 \
               --show-error --silent \
               -X POST \
               -H "Accept: application/json" \
               -w "\n\n[HTTP %{http_code} — total %{time_total}s]\n" \
               "$URL"