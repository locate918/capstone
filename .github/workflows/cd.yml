name: CD Pipeline

on:
  workflow_run:
    workflows: [ "CI Pipeline" ]
    types: [ completed ]
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cd-${{ github.workflow }}-production
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      # ====================
      # Build Frontend
      # ====================
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          npm ci --prefix frontend
          npm run build --prefix frontend

      - name: Validate health check secrets
        env:
          BACKEND_HEALTHCHECK_URL: ${{ secrets.BACKEND_HEALTHCHECK_URL }}
          LLM_HEALTHCHECK_URL: ${{ secrets.LLM_HEALTHCHECK_URL }}
          FRONTEND_HEALTHCHECK_URL: ${{ secrets.FRONTEND_HEALTHCHECK_URL }}
        run: |
          test -n "$BACKEND_HEALTHCHECK_URL" || (echo "Missing BACKEND_HEALTHCHECK_URL" && exit 1)
          test -n "$LLM_HEALTHCHECK_URL" || (echo "Missing LLM_HEALTHCHECK_URL" && exit 1)
          test -n "$FRONTEND_HEALTHCHECK_URL" || (echo "Missing FRONTEND_HEALTHCHECK_URL" && exit 1)

      - name: Trigger Vercel frontend deploy
        if: ${{ secrets.VERCEL_DEPLOY_HOOK != '' }}
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: curl -fsS -X POST "$VERCEL_DEPLOY_HOOK"

      - name: Wait for backend health check
        env:
          BACKEND_HEALTHCHECK_URL: ${{ secrets.BACKEND_HEALTHCHECK_URL }}
        run: |
          for i in {1..30}; do
            curl -fsS "$BACKEND_HEALTHCHECK_URL" && exit 0
            echo "Backend not ready yet ($i/30)..."
            sleep 10
          done
          echo "Backend health check failed"
          exit 1

      - name: Wait for LLM health check
        env:
          LLM_HEALTHCHECK_URL: ${{ secrets.LLM_HEALTHCHECK_URL }}
        run: |
          for i in {1..30}; do
            curl -fsS "$LLM_HEALTHCHECK_URL" && exit 0
            echo "LLM service not ready yet ($i/30)..."
            sleep 10
          done
          echo "LLM health check failed"
          exit 1

      - name: Wait for frontend health check
        env:
          FRONTEND_HEALTHCHECK_URL: ${{ secrets.FRONTEND_HEALTHCHECK_URL }}
        run: |
          for i in {1..30}; do
            curl -fsS "$FRONTEND_HEALTHCHECK_URL" && exit 0
            echo "Frontend not ready yet ($i/30)..."
            sleep 10
          done
          echo "Frontend health check failed"
          exit 1
