name: CI Pipeline

on:
  pull_request:
  push:
    branches: ["main", "develop"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            backend/target
          key: cargo-${{ runner.os }}-${{ hashFiles('backend/Cargo.lock') }}

      - name: Check formatting
        working-directory: backend
        run: cargo fmt --all -- --check

      - name: Lint with Clippy
        working-directory: backend
        run: cargo clippy --all-targets -- -D warnings -A clippy::needless_borrows_for_generic_args -A clippy::empty_line_after_doc_comments

      - name: Run Rust tests
        working-directory: backend
        run: cargo test --all-targets -- --nocapture

  llm_service:
    name: LLM Service
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            llm-service/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r llm-service/requirements.txt
          pip install ruff

      - name: Lint Python
        run: ruff check llm-service/app llm-service/tests

      - name: Compile Python sources
        run: python -m compileall llm-service/app

      - name: Run Python tests
        run: PYTHONPATH=llm-service pytest -q llm-service/tests

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Run frontend tests
        env:
          CI: "true"
        run: npm test --prefix frontend -- --watchAll=false

      - name: Build frontend
        env:
          CI: "true"
        run: npm run build --prefix frontend
